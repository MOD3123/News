<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting to Stream...</title>
    <style>
        body { background: #000; color: #555; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>

<div id="status">Pripravujem stream...</div>

<script>
const APP_VERSION = '3.7.1';

// Pomocná funkcia na získanie parametrov z URL (?chid=XXX&epgid=YYY)
const urlParams = new URLSearchParams(window.location.search);
const chid = urlParams.get('chid');
const epgid = urlParams.get('epgid');

function randomMac() {
    return Array.from({length:6}, () =>
        Math.floor(Math.random()*256).toString(16).padStart(2,'0')
    ).join(':');
}

const DEVICE = {
    uuid: crypto.randomUUID(),
    mac:  randomMac(),
};

function makeDevice() {
    return {
        type: 'DT_AndroidTV',
        mac:  DEVICE.mac,
        uuid: DEVICE.uuid,
        firmware: { versionCode: 1301, versionString: APP_VERSION, modules: [] },
        sub_type: 'DST_Unknown',
        screen_info: { width: 1920, height: 1080, aspectRatio: 'AR_16_9' },
        application: { type: 'AT_SWEET_TV_Player' },
        vendor: 'unknown',
        supported_drm: {
            aes128: false, widevineModular: true,
            widevineClassic: false, playReady: false, fairPlay: false,
        },
        guid: '', system: '',
        system_info: {
            network_connection_type: 'NCT_Unknown',
            os_version: '23', total_memory: 2, hardware: '',
        },
        advertisingId: crypto.randomUUID(),
    };
}

async function redirect() {
    if (!chid) {
        document.getElementById('status').textContent = "Chýba Channel ID v URL (?chid=XXX)";
        return;
    }

    try {
        const body = {
            without_auth: true,
            channel_id:   Number(chid),
            multistream:  true,
            device:        makeDevice(),
        };
        if (epgid) body.epg_id = Number(epgid);

        const resp = await fetch('https://api.sweet.tv/TvService/OpenStream.json', {
            method: 'POST',
            headers: {
                'Content-Type':    'application/json',
                'Accept':          'application/json',
                'Accept-Language': 'sk',
                'x-device':        `1;22;0;2;${APP_VERSION}`,
                'Origin':          'https://sweet.tv',
                'Referer':         'https://sweet.tv/',
            },
            body: JSON.stringify(body),
        });

        const data = await resp.json();
        
        if (data.result === 'OK') {
            const host  = data.http_stream?.host?.address;
            const spath = data.http_stream?.url;
            const streamUrl = `https://${host}${spath}`;
            
            // HLAVNÝ REDIRECT
            window.location.replace(streamUrl);
        } else {
            document.getElementById('status').textContent = "Chyba: " + (data.result || "Neznáma chyba");
        }
    } catch(e) {
        document.getElementById('status').textContent = "Chyba siete alebo API.";
    }
}

// Spustiť okamžite pri načítaní
redirect();
</script>
</body>
</html>
